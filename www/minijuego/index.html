<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#ffffff">
  <title>MOSCA 8 BIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root{color-scheme:light;--black:#050505;--white:#fff;--gray:#050505;--pixel:"Press Start 2P","Courier New",monospace;--border:4px solid var(--black);--shadow:5px 5px 0 var(--black)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;image-rendering:pixelated;image-rendering:crisp-edges}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--white);color:var(--black);font-family:var(--pixel);touch-action:none;overscroll-behavior:none}
    body{position:fixed;inset:0}
    canvas{display:block;width:100%;height:100%;background:#fff;image-rendering:pixelated}
    .hud{position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;z-index:3;display:flex;justify-content:space-between;gap:10px;pointer-events:none}
    .hudBox{min-width:118px;padding:9px;background:#fff;border:var(--border);box-shadow:var(--shadow)}
    .hudBox:last-child{text-align:right}.hudLabel{display:block;margin-bottom:7px;font-size:8px;line-height:1.5}.hudValue{display:block;font-size:clamp(13px,4vw,18px);line-height:1.4;font-variant-numeric:tabular-nums}
    .pixelButton{border:var(--border);border-radius:0;background:#fff;color:#050505;box-shadow:var(--shadow);font-family:var(--pixel);text-transform:uppercase;cursor:pointer}
    .pixelButton:active{transform:translate(4px,4px);box-shadow:1px 1px 0 #050505}
    .backButton{position:fixed;left:12px;bottom:max(12px,env(safe-area-inset-bottom));z-index:12;min-height:48px;padding:10px 12px;font-size:9px;line-height:1.5}
    .overlay{position:fixed;inset:0;z-index:10;display:grid;place-items:center;padding:18px;background:#fff;transition:opacity .16s linear;overflow:visible}
    .overlay.hidden{opacity:0;pointer-events:none}.panel{position:relative;width:min(440px,100%);padding:18px 15px;text-align:center;background:#fff;border:var(--border);box-shadow:8px 8px 0 #050505;overflow:visible}
    .preview{display:block;width:118px;height:118px;margin:0 auto 8px;object-fit:contain;image-rendering:pixelated}
    h1{margin:0 0 14px;font-size:clamp(22px,7vw,34px);line-height:1.35;overflow:visible}
    h1.brokenFact{position:relative;left:-85px;width:max-content;max-width:none;white-space:nowrap;font-size:10px;line-height:1.8;text-align:left;z-index:30}
    p{max-width:350px;margin:0 auto 18px;color:var(--gray);font-size:9px;line-height:1.9}
    .result{display:none;margin:18px 0 14px;padding:14px 9px;border:var(--border);box-shadow:var(--shadow)}.result.show{display:block}.resultLabel{display:block;margin-bottom:12px;font-size:9px;line-height:1.6}.resultTime{font-size:clamp(22px,8vw,34px);line-height:1.4;font-variant-numeric:tabular-nums}
    .records{margin:0 0 18px;padding:15px 13px;border:var(--border);box-shadow:var(--shadow);background:#fff;text-align:left}
    .recordsTitle{display:block;margin-bottom:13px;text-align:center;font-size:12px;line-height:1.6}
    .recordsList{display:grid;gap:10px}
    .recordRow{display:grid;grid-template-columns:29px 1fr auto;align-items:center;gap:10px;padding-bottom:9px;border-bottom:2px solid #050505;font-size:10.5px;line-height:1.5}
    .recordRow:last-child{padding-bottom:0;border-bottom:0}
    .recordPos{font-size:12px}.recordTime{font-variant-numeric:tabular-nums}.recordDate{white-space:nowrap;text-align:right;font-size:9px}
    .recordsEmpty{text-align:center;font-size:10.5px;line-height:1.7}
    .mainButton{width:100%;min-height:58px;padding:12px 8px;font-size:11px;line-height:1.7}.mainButton[disabled]{opacity:.45;cursor:wait;transform:none!important;box-shadow:var(--shadow)!important}
    .hint{position:fixed;left:50%;bottom:max(78px,calc(env(safe-area-inset-bottom) + 78px));z-index:4;width:min(90vw,440px);padding:10px;transform:translateX(-50%);border:var(--border);box-shadow:var(--shadow);background:#fff;text-align:center;font-size:8px;line-height:1.7;opacity:0;pointer-events:none;transition:opacity .16s linear}.hint.show{opacity:1}
    .asset{display:none}
    @media(max-width:420px){.hudBox{min-width:104px}.panel{padding:15px 12px}h1.brokenFact{left:-130px;font-size:9px}}
  </style>
</head>
<body>
  <canvas id="game" aria-label="Minijuego de la mosca"></canvas>
  <div class="hud" id="hud" hidden>
    <div class="hudBox"><span class="hudLabel">TIEMPO</span><span class="hudValue"><span id="timer">0.00</span> S</span></div>
    <div class="hudBox"><span class="hudLabel">RÉCORD</span><span class="hudValue"><span id="best">0.00</span> S</span></div>
  </div>
  <button class="pixelButton backButton" id="backButton" type="button">&lt; VOLVER</button>
  <div class="hint" id="hint">NO DETECTO EL GIROSCOPIO. REVISÁ LOS PERMISOS DEL TELÉFONO.</div>
  <div class="overlay" id="overlay">
    <div class="panel">
      <img class="preview" id="previewFly" alt="Mosca pixelada" src="assets/preview-fly.png">
      <h1 id="title">MOSCA 8 BIT</h1>
      <p id="description">INCLINÁ EL CELULAR PARA ESCAPAR. EL MATAMOSCAS TE SIGUE Y GOLPEA SIN PATRÓN.</p>
      <div class="result" id="result"><span class="resultLabel">SOBREVIVISTE</span><div class="resultTime" id="resultTime">0.00 S</div></div>
      <div class="records" id="recordsBox">
        <span class="recordsTitle">TOP 3 RÉCORDS</span>
        <div class="recordsList" id="recordsList"><div class="recordsEmpty">SIN RÉCORDS</div></div>
      </div>
      <button class="pixelButton mainButton" id="playButton" type="button">JUGAR</button>
    </div>
  </div>

  <img class="asset" id="flyRestAsset" alt="" src="assets/fly-rest.png">
  <img class="asset" id="flyMidAsset" alt="" src="assets/fly-mid.png">
  <img class="asset" id="flyOpenAsset" alt="" src="assets/fly-open.png">
  <img class="asset" id="flyDeadAsset" alt="" src="assets/fly-dead.png">
  <img class="asset" id="swatterIdleAsset" alt="" src="assets/swatter-idle.png">
  <img class="asset" id="swatterStrikeAsset" alt="" src="assets/swatter-strike.png">
  <img class="asset" id="swatterShadowAsset" alt="" src="assets/swatter-shadow.png">
  
  <img class="asset" id="backgroundAsset" alt="" src="assets/background.png">

  function updateStalker(dt,now){const dist=Math.hypot(fly.x-attack.hoverX,fly.y-attack.hoverY);if(now>=attack.nextHoverAt||dist>270)chooseHoverTarget(now,false);const bobX=Math.sin(now/360)*8,bobY=Math.cos(now/430)*7,dx=clamp(fly.x+attack.hoverOffsetX+bobX,attack.hitRadius+10,width-attack.hitRadius-10),dy=clamp(fly.y+attack.hoverOffsetY+bobY,attack.hitRadius+86,height-attack.hitRadius-10),s=1-Math.exp(-dt*3.7);attack.hoverX+=(dx-attack.hoverX)*s;attack.hoverY+=(dy-attack.hoverY)*s;const dir=Math.atan2(fly.y-attack.hoverY,fly.x-attack.hoverX);attack.hoverRotation=dir*.12+Math.sin(now/500)*.08}
  function scheduleAttack(now){const elapsed=Math.max(0,(now-startTime)/1000);attack.phase="stalking";attack.phaseStart=now;attack.checked=false;chooseHoverTarget(now,false);const delay=randomBetween(720,3000)+randomBetween(0,760);attack.nextAt=now+clamp(delay-elapsed*11,520,3300)}
  function beginAttack(now){const elapsed=Math.max(0,(now-startTime)/1000);attack.warningMs=clamp(randomBetween(280,980)-elapsed*randomBetween(1.5,5.2),210,980);attack.slamMs=randomBetween(82,155);attack.holdMs=randomBetween(300,690);attack.retractMs=randomBetween(190,390);attack.startX=attack.hoverX;attack.startY=attack.hoverY;const roll=Math.random();attack.aimMode=roll<.36?"direct":roll<.78?"predict":"wild";let prediction=0,error=randomBetween(12,58);if(attack.aimMode==="predict"){prediction=randomBetween(.22,.92);error=randomBetween(10,48)}else if(attack.aimMode==="wild"){prediction=randomBetween(.05,.55);error=randomBetween(58,128)}error=Math.max(8,error-elapsed*.55);const a=randomBetween(-Math.PI,Math.PI);attack.targetX=clamp(fly.x+fly.vx*prediction+Math.cos(a)*error,attack.hitRadius+8,width-attack.hitRadius-8);attack.targetY=clamp(fly.y+fly.vy*prediction+Math.sin(a)*error,attack.hitRadius+82,height-attack.hitRadius-8);attack.rotation=randomBetween(-.34,.34);attack.phase="warning";attack.phaseStart=now;attack.checked=false}
  function checkImpact(now){if(attack.checked)return;attack.checked=true;const dx=fly.x-attack.targetX,dy=fly.y-attack.targetY,hit=attack.hitRadius+fly.radius*.4;if(dx*dx+dy*dy<=hit*hit){fly.crushed=true;playCrushSound();try{navigator.vibrate?.([70,35,140])}catch(_){}endGame(now)}else{try{navigator.vibrate?.(20)}catch(_){}}}
  function updateAttack(dt,now){if(attack.phase==="stalking"){updateStalker(dt,now);if(now>=attack.nextAt)beginAttack(now);return}if(attack.phase==="warning"){updateStalker(dt*.35,now);if(now-attack.phaseStart>=attack.warningMs){attack.phase="slam";attack.phaseStart=now}return}if(attack.phase==="slam"){if((now-attack.phaseStart)/attack.slamMs>=1){checkImpact(now);if(state==="running"){attack.phase="hold";attack.phaseStart=now}}return}if(attack.phase==="hold"){if(now-attack.phaseStart>=attack.holdMs){attack.phase="retract";attack.phaseStart=now;chooseHoverTarget(now,false)}return}if(attack.phase==="retract"){updateStalker(dt,now);if(now-attack.phaseStart>=attack.retractMs)scheduleAttack(now)}}
  function updateDeadSequence(now){const elapsed=now-attack.phaseStart;if(attack.phase==="deadImpact"&&elapsed>=300){attack.phase="deadLift";attack.phaseStart=now}else if(attack.phase==="deadLift"&&elapsed>=650){attack.phase="deadParked";attack.phaseStart=now}}
  function updateFly(dt,now){const keyboardX=(keys.has("ArrowRight")||keys.has("d")?1:0)-(keys.has("ArrowLeft")||keys.has("a")?1:0),keyboardY=(keys.has("ArrowDown")||keys.has("s")?1:0)-(keys.has("ArrowUp")||keys.has("w")?1:0);let inputX=keyboardX,inputY=keyboardY;const fresh=neutral&&now-lastOrientationAt<900;if(fresh){const dx=currentOrientation.x-neutral.x,dy=currentOrientation.y-neutral.y,dz=1.4;inputX+=Math.abs(dx)>dz?dx/18:0;inputY+=Math.abs(dy)>dz?dy/18:0}inputX=clamp(inputX,-1.35,1.35);inputY=clamp(inputY,-1.35,1.35);const maxSpeed=clamp(Math.min(width,height)*.74,280,470),s=1-Math.pow(.0008,dt);fly.vx+=(inputX*maxSpeed-fly.vx)*s;fly.vy+=(inputY*maxSpeed-fly.vy)*s;fly.x+=fly.vx*dt;fly.y+=fly.vy*dt;const left=fly.radius+8,right=width-fly.radius-8,top=fly.radius+82,bottom=height-fly.radius-8;if(fly.x<left){fly.x=left;fly.vx=Math.max(0,fly.vx)*.25}if(fly.x>right){fly.x=right;fly.vx=Math.min(0,fly.vx)*.25}if(fly.y<top){fly.y=top;fly.vy=Math.max(0,fly.vy)*.25}if(fly.y>bottom){fly.y=bottom;fly.vy=Math.min(0,fly.vy)*.25}}
  function drawImageCentered(image,size,flip=false){if(!image||!image.complete||!image.naturalWidth)return false;ctx.save();if(flip)ctx.scale(-1,1);ctx.imageSmoothingEnabled=false;ctx.drawImage(image,-size/2,-size/2,size,size);ctx.restore();return true}
  const spriteBoundsCache=new WeakMap();
  function getSpriteBounds(image){
    if(!image?.complete||!image.naturalWidth)return{w:1,h:1};
    const cached=spriteBoundsCache.get(image);if(cached)return cached;
    const cnv=document.createElement("canvas");cnv.width=image.naturalWidth;cnv.height=image.naturalHeight;
    const c=cnv.getContext("2d",{willReadFrequently:true});
    c.clearRect(0,0,cnv.width,cnv.height);c.imageSmoothingEnabled=false;c.drawImage(image,0,0);
    const data=c.getImageData(0,0,cnv.width,cnv.height).data;let minX=cnv.width,minY=cnv.height,maxX=-1,maxY=-1;
    for(let y=0;y<cnv.height;y++)for(let x=0;x<cnv.width;x++){const a=data[(y*cnv.width+x)*4+3];if(a>16){if(x<minX)minX=x;if(y<minY)minY=y;if(x>maxX)maxX=x;if(y>maxY)maxY=y;}}
    const bounds=maxX>=minX?{w:maxX-minX+1,h:maxY-minY+1}:{w:cnv.width,h:cnv.height};
    spriteBoundsCache.set(image,bounds);return bounds;
  }
  function drawFlySprite(image,targetBodySize,flip=false){
    const ref=getSpriteBounds(flyOpenAsset), cur=getSpriteBounds(image);
    const refMax=Math.max(ref.w,ref.h)||1, curMax=Math.max(cur.w,cur.h)||1;
    const normalizedSize=targetBodySize*(refMax/curMax);
    return drawImageCentered(image,normalizedSize,flip);
  }
  function drawFly(now){
    ctx.save();
    ctx.translate(Math.round(fly.x),Math.round(fly.y));
    if(fly.crushed||state==="gameover"){
      drawImageCentered(flyDeadAsset,fly.deadSize,false);
    }else{
      const useOpen=Math.floor(now/82)%2!==0;
      const image=useOpen?flyOpenAsset:flyMidAsset;
      const frameScale=useOpen?1.05:1.0;
      drawImageCentered(image,fly.spriteSize*frameScale,fly.vx<-3);
    }
    ctx.restore();
  }
  function drawWarning(now){const p=clamp((now-attack.phaseStart)/attack.warningMs,0,1),blink=Math.floor(p*12)%2===0,r=Math.round(attack.hitRadius*(1.32-p*.25));ctx.save();ctx.translate(Math.round(attack.targetX),Math.round(attack.targetY));ctx.strokeStyle="#050505";ctx.fillStyle="#050505";ctx.lineWidth=3;ctx.strokeRect(-r,-r,r*2,r*2);const arm=Math.max(10,Math.round(r*.32));if(blink){ctx.fillRect(-2,-r,4,arm);ctx.fillRect(-2,r-arm,4,arm);ctx.fillRect(-r,-2,arm,4);ctx.fillRect(r-arm,-2,arm,4)}ctx.restore()}
  const followerShadowCache=new WeakMap();
  let bgCache=null,bgCacheW=0,bgCacheH=0;
  function getSwatterPose(now){
    if(!["stalking","warning","slam","hold","retract","deadImpact","deadLift","deadParked"].includes(attack.phase))return null;
    let x=attack.hoverX,y=attack.hoverY,scale=.64,alpha=.56,rotation=attack.hoverRotation,image=swatterIdleAsset;
    if(attack.phase==="warning"){
      const p=clamp((now-attack.phaseStart)/attack.warningMs,0,1),creep=Math.min(.42,p*.42);
      x=attack.startX+(attack.targetX-attack.startX)*creep;y=attack.startY+(attack.targetY-attack.startY)*creep;
      scale=.66+p*.1;alpha=.62+p*.25;rotation=attack.hoverRotation+(attack.rotation-attack.hoverRotation)*p;image=swatterIdleAsset;
    }else if(attack.phase==="slam"){
      const p=clamp((now-attack.phaseStart)/attack.slamMs,0,1),e=easeOutCubic(p);
      x=attack.targetX;y=attack.targetY;scale=1.52-e*.52;alpha=.18+e*.82;rotation=attack.rotation;image=swatterStrikeAsset;
    }else if(attack.phase==="hold"){
      x=attack.targetX;y=attack.targetY;scale=1;alpha=1;rotation=attack.rotation;image=swatterIdleAsset;
    }else if(attack.phase==="retract"){
      const p=clamp((now-attack.phaseStart)/attack.retractMs,0,1),e=easeOutCubic(p);
      x=attack.targetX+(attack.hoverX-attack.targetX)*e;y=attack.targetY+(attack.hoverY-attack.targetY)*e;
      scale=1-e*.36;alpha=1-e*.44;rotation=attack.rotation+(attack.hoverRotation-attack.rotation)*e;image=swatterIdleAsset;
    }else if(attack.phase==="deadImpact"){
      x=attack.targetX;y=attack.targetY;scale=1;alpha=1;rotation=attack.rotation;image=swatterIdleAsset;
    }else if(attack.phase==="deadLift"){
      const p=clamp((now-attack.phaseStart)/650,0,1),e=easeOutCubic(p);
      x=attack.targetX+(attack.parkX-attack.targetX)*e;y=attack.targetY+(attack.parkY-attack.targetY)*e;
      scale=1-e*.26;alpha=1;rotation=attack.rotation+(attack.parkRotation-attack.rotation)*e;image=swatterIdleAsset;
    }else if(attack.phase==="deadParked"){
      x=attack.parkX;y=attack.parkY;scale=.74;alpha=1;rotation=attack.parkRotation;image=swatterIdleAsset;
    }
    return{x,y,scale,alpha,rotation,image};
  }
  function buildFollowerShadow(image){
    if(!image?.complete||!image.naturalWidth)return null;
    const cached=followerShadowCache.get(image);
    if(cached)return cached;
    const cnv=document.createElement("canvas");
    cnv.width=image.naturalWidth;cnv.height=image.naturalHeight;
    const c=cnv.getContext("2d");
    c.clearRect(0,0,cnv.width,cnv.height);
    c.imageSmoothingEnabled=false;
    c.drawImage(image,0,0);
    followerShadowCache.set(image,cnv);
    return cnv;
  }
  function ensurePlainBackground(){
    if(bgCache&&bgCacheW===width&&bgCacheH===height)return;
    bgCacheW=width;bgCacheH=height;
    bgCache=document.createElement("canvas");
    bgCache.width=width;bgCache.height=height;
    const b=bgCache.getContext("2d");
    b.fillStyle="#ffffff";
    b.fillRect(0,0,width,height);
  }
  function drawGloomBackground(){
    ensurePlainBackground();
    ctx.drawImage(bgCache,0,0,width,height);
  }
  function drawFollowerShadow(now){return;}
  function drawSwatter(now){const pose=getSwatterPose(now);if(!pose)return;const size=attack.swatterSize*pose.scale,headX=size*.34,headY=size*.36;ctx.save();ctx.translate(Math.round(pose.x),Math.round(pose.y));ctx.rotate(pose.rotation);ctx.globalAlpha=pose.alpha;ctx.imageSmoothingEnabled=false;if(pose.image?.complete&&pose.image.naturalWidth)ctx.drawImage(pose.image,-headX,-headY,size,size);ctx.restore()}
  function render(now){ctx.clearRect(0,0,width,height);drawGloomBackground();if(state==="running"||state==="gameover"){if(attack.phase==="warning")drawWarning(now);drawFly(now);if(["slam","hold","deadImpact","deadLift","deadParked"].includes(attack.phase))drawSwatter(now)}}
  function loop(now){const dt=Math.min(.034,Math.max(0,(now-lastFrame)/1000));lastFrame=now;if(state==="running"){updateFly(dt,now);updateAttack(dt,now);timerEl.textContent=((now-startTime)/1000).toFixed(2);if(!orientationActive&&now-startTime>1400&&!hintTimer){hint.classList.add("show");hintTimer=setTimeout(()=>{hint.classList.remove("show");hintTimer=0},2600)}}else if(state==="gameover")updateDeadSequence(now);render(now);requestAnimationFrame(loop)}
  async function startGame(){prepareAssets();await unlockGameSounds();startFlySound();await Promise.allSettled([prepareAssets(),enableOrientation()]);if(deathOverlayTimer){clearTimeout(deathOverlayTimer);deathOverlayTimer=0}state="running";startTime=performance.now();lastFrame=startTime;fly.x=width/2;fly.y=height*.56;fly.vx=0;fly.vy=0;fly.crushed=false;neutral=null;currentOrientation={x:0,y:0};lastOrientationAt=0;orientationActive=false;attack.phase="stalking";attack.checked=false;attack.hoverX=clamp(fly.x+120,attack.hitRadius+10,width-attack.hitRadius-10);attack.hoverY=clamp(fly.y-100,attack.hitRadius+86,height-attack.hitRadius-10);chooseHoverTarget(startTime,true);title.textContent="MOSCA 8 BIT";title.classList.remove("brokenFact");description.textContent="INCLINÁ EL CELULAR PARA ESCAPAR. EL MATAMOSCAS TE SIGUE Y GOLPEA SIN PATRÓN.";playButton.textContent="JUGAR OTRA VEZ";result.classList.remove("show");previewFly.src=flyRestAsset.src;overlay.classList.add("hidden");hud.hidden=false;timerEl.textContent="0.00";bestEl.textContent=bestTime.toFixed(2);scheduleAttack(startTime+450)}
  function endGame(now){if(state!=="running")return;stopFlySound();state="gameover";attack.phase="deadImpact";attack.phaseStart=now;const side=fly.x<width/2?1:-1;attack.parkX=clamp(fly.x+side*clamp(width*.26,115,175),attack.hitRadius+12,width-attack.hitRadius-12);attack.parkY=clamp(fly.y+clamp(height*.08,35,70),attack.hitRadius+86,height-attack.hitRadius-12);attack.parkRotation=side>0?.24:-.24;const finalTime=(now-startTime)/1000;const topRecords=saveRecord(finalTime);if(finalTime>bestTime){bestTime=finalTime;try{localStorage.setItem(STORAGE_KEY,String(bestTime))}catch(_){}}if(topRecords.length&&topRecords[0].time>bestTime)bestTime=topRecords[0].time;timerEl.textContent=finalTime.toFixed(2);bestEl.textContent=bestTime.toFixed(2);resultTime.textContent=finalTime.toFixed(2)+" S";const msg=pickLossMessage();title.textContent=msg.text;title.classList.toggle("brokenFact",!!msg.fact);description.textContent="";result.classList.add("show");previewFly.src=flyDeadAsset.src;deathOverlayTimer=setTimeout(()=>{overlay.classList.remove("hidden");deathOverlayTimer=0},1450)}
  addEventListener("keydown",e=>{keys.add(e.key);if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key))e.preventDefault();if(e.key===" "&&state!=="running")startGame()},{passive:false});addEventListener("keyup",e=>keys.delete(e.key));
  playButton.addEventListener("click",startGame);addEventListener("resize",resize);addEventListener("orientationchange",()=>setTimeout(()=>{resize();neutral=null},250));

  document.addEventListener("visibilitychange",()=>{if(document.hidden)stopFlySound();else if(state==="running")startFlySound()});addEventListener("pagehide",stopFlySound);backButton.addEventListener("click",returnToApp);addEventListener("keydown",e=>{if(e.key==="Escape")returnToApp()});
  resize();const initialRecords=loadRecords();if(initialRecords.length&&initialRecords[0].time>bestTime)bestTime=initialRecords[0].time;bestEl.textContent=bestTime.toFixed(2);renderRecords();prepareAssets();requestAnimationFrame(loop);
