name: Compilar APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Bajar el código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar componentes Android necesarios
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Instalar dependencias Node
        run: npm install

      - name: Crear proyecto Android
        run: |
          npx cap add android
          npx cap sync android

      - name: Compilar APK debug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -100

      - name: Verificar APK generado
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          ls -lh $APK
          file $APK

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: MiContabilidad-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
