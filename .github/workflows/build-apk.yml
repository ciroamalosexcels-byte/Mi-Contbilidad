name: Compilar APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Bajar el código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar componentes Android
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Instalar dependencias Node
        run: npm install

      - name: Crear proyecto Android
        run: |
          npx cap add android
          npx cap sync android

      - name: Compilar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Renombrar APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk MiContabilidad.apk

      - name: Publicar como GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "Última versión"
          body: "APK generado automáticamente desde la rama main."
          files: MiContabilidad.apk
          make_latest: true
